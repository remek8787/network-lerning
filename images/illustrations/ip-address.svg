    <text x="465" y="320" text-anchor="middle">Subnet</text>
    <text x="595" y="320" text-anchor="middle">Host</text>
  </g>
  <text x="400" y="408" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial" font-size="28" font-weight="700">Pahami network, subnet, host, dan gateway</text>
</svg>
